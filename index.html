<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Erosion & Deposition Simulator</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f4f4f4;
}

header {
    background: #2c3e50;
    color: white;
    padding: 1rem;
    text-align: center;
}

.container {
    display: flex;
    flex-wrap: wrap;
    padding: 10px;
}

.panel {
    flex: 1;
    min-width: 300px;
    background: white;
    margin: 10px;
    padding: 12px;
    border-radius: 8px;
}

canvas {
    border: 1px solid #ccc;
    background: #cfefff;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}

label {
    display:block;
    margin-top:10px;
}
</style>
</head>

<body>

<header>
<h2>🌊 Erosion & Deposition Simulator</h2>
</header>

<div class="container">

<!-- CONTROLS -->
<div class="panel">
<h3>Controls</h3>

<label>Slope: <span id="slopeVal">2.5%</span></label>
<input type="range" id="slope" min="0" max="5" step="0.1" value="2.5"
oninput="updateTerrain(); updateLabels();">

<label>Water Flow Speed: <span id="waterVal">50%</span></label>
<input type="range" id="water" min="0" max="100" value="50"
oninput="updateLabels()">

<label>Vegetation Cover: <span id="vegVal">40%</span></label>
<input type="range" id="veg" min="0" max="100" value="40"
oninput="updateTerrain(); updateLabels();">

<label>Ground Type</label>
<select id="ground" onchange="updateTerrain()">
<option value="sand">Sand</option>
<option value="soil" selected>Soil</option>
<option value="rock">Rock</option>
</select>

<button onclick="runStorm()">🌧 Run Storm (1 Year)</button>

</div>

<!-- LANDSCAPE -->
<div class="panel">
<h3>Landscape</h3>
<canvas id="land" width="500" height="250"></canvas>
</div>

<!-- GRAPH -->
<div class="panel">
<h3>Data Over Time</h3>
<canvas id="chart"></canvas>
</div>

</div>

<script>

// --------------------
// DATA
// --------------------
let land = [];
const W = 60;
let year = 0;

let labels = [];
let erosionData = [];
let depositionData = [];
let heightData = [];

// --------------------
// INIT LAND (REALISTIC SLOPE)
// --------------------
function initLand() {
    land = [];

    const slope = document.getElementById("slope").value / 100;

    let base = 180;

    for (let i = 0; i < W; i++) {
        land.push(base - i * slope * 60);
    }
}
initLand();

// --------------------
// UPDATE LABELS
// --------------------
function updateLabels() {
    document.getElementById("slopeVal").innerText =
        document.getElementById("slope").value + "%";

    document.getElementById("waterVal").innerText =
        document.getElementById("water").value + "%";

    document.getElementById("vegVal").innerText =
        document.getElementById("veg").value + "%";
}

// --------------------
// DRAW LAND
// --------------------
function drawLand(waterParticles = []) {
    const c = document.getElementById("land");
    const ctx = c.getContext("2d");

    ctx.clearRect(0,0,c.width,c.height);

    const ground = document.getElementById("ground").value;

    let groundColor = "#8B5A2B";
    if (ground === "sand") groundColor = "#d8c27a";
    if (ground === "rock") groundColor = "#666";

    // terrain
    ctx.beginPath();
    ctx.moveTo(0, c.height);

    for (let i = 0; i < land.length; i++) {
        ctx.lineTo(i * (c.width/W), c.height - land[i]);
    }

    ctx.lineTo(c.width, c.height);
    ctx.fillStyle = groundColor;
    ctx.fill();

    // water
    ctx.fillStyle = "rgba(0,150,255,0.7)";
    waterParticles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, 4, 0, Math.PI*2);
        ctx.fill();
    });

    // vegetation
    const veg = document.getElementById("veg").value / 100;

    for (let i = 0; i < land.length; i++) {
        for (let j = 0; j < veg * 8; j++) {
            if (Math.random() < veg) {
                ctx.fillStyle = "green";
                ctx.fillRect(
                    i*(c.width/W),
                    c.height-land[i]-Math.random()*10,
                    2,2
                );
            }
        }
    }
}

// --------------------
// UPDATE TERRAIN
// --------------------
function updateTerrain() {
    initLand();
    drawLand();
}

// --------------------
// WATER FLOW (DOWN SLOPE)
// --------------------
function animateWater(callback) {

    let particles = [];

    for (let i = 0; i < 40; i++) {
        particles.push({
            x: Math.random() * 500,
            y: 20,
            vx: 1 + Math.random(),
            vy: 0.2 + Math.random() * 0.6
        });
    }

    let frames = 0;

    function step() {
        frames++;

        const slope = document.getElementById("slope").value / 100;

        particles.forEach(p => {

            // downhill movement
            p.x += p.vx + slope * 3;
            p.y += p.vy + slope * 2;

            if (p.y > 250) p.y = 250;
        });

        drawLand(particles);

        if (frames < 60) {
            requestAnimationFrame(step);
        } else {
            callback();
        }
    }

    step();
}

// --------------------
// EROSION MODEL
// --------------------
function simulateErosion() {

    let erosion = 0;
    let deposition = 0;

    const water = document.getElementById("water").value / 100;
    const veg = document.getElementById("veg").value / 100;
    const ground = document.getElementById("ground").value;

    let groundFactor = 1;
    if (ground === "sand") groundFactor = 1.6;
    if (ground === "rock") groundFactor = 0.4;

    let vegFactor = 1 - veg;

    let slopeFactor = document.getElementById("slope").value / 5;

    let factor = water * groundFactor * vegFactor * slopeFactor * 0.06;

    let newLand = [...land];

    for (let i = 1; i < W; i++) {
        let diff = land[i-1] - land[i];

        if (diff > 0) {
            let move = diff * factor;

            newLand[i-1] -= move;
            newLand[i] += move * 0.7;

            erosion += move;
            deposition += move * 0.7;
        }
    }

    land = newLand;

    return { erosion, deposition };
}

// --------------------
// RUN STORM
// --------------------
function runStorm() {

    animateWater(() => {

        const result = simulateErosion();

        year++;

        let avg = land.reduce((a,b)=>a+b,0)/land.length;

        labels.push("Year " + year);
        erosionData.push(result.erosion.toFixed(2));
        depositionData.push(result.deposition.toFixed(2));
        heightData.push(avg.toFixed(2));

        updateChart();
        drawLand();
    });
}

// --------------------
// CHART
// --------------------
let chart;

function updateChart() {
    if (!chart) {
        chart = new Chart(document.getElementById("chart"), {
            type: "line",
            data: {
                labels,
                datasets: [
                    { label:"Erosion", data: erosionData },
                    { label:"Deposition", data: depositionData },
                    { label:"Avg Height", data: heightData }
                ]
            }
        });
    } else {
        chart.update();
    }
}

// INIT
updateLabels();
drawLand();

</script>

</body>
</html>
