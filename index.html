<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Erosion & Landscape Simulator</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f4f4f4;
}

header {
    background: #2c3e50;
    color: white;
    padding: 1rem;
    text-align: center;
}

.container {
    display: flex;
    flex-wrap: wrap;
    padding: 10px;
    gap: 10px;
}

.panel {
    flex: 1;
    min-width: 280px;
    background: white;
    padding: 12px;
    border-radius: 8px;
}

canvas {
    border: 1px solid #ccc;
    background: #cfefff;
}

.control-row {
    margin-bottom: 12px;
}

label {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    margin-bottom: 4px;
}

input[type=range] {
    width: 100%;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
}
table {
    width: 100%;
    border-collapse: collapse;
}
td, th {
    border: 1px solid #ccc;
    padding: 5px;
    text-align: center;
}
</style>
</head>

<body>

<header>
<h2>🌊 Erosion & Landscape Simulator</h2>
</header>

<div class="container">

<!-- CONTROLS -->
<div class="panel">
<h3>Controls</h3>

<div class="control-row">
<label>Slope <span id="slopeVal">2.5%</span></label>
<input id="slope" type="range" min="0" max="5" step="0.1" value="2.5">
</div>

<div class="control-row">
<label>Water Flow <span id="waterVal">50%</span></label>
<input id="water" type="range" min="0" max="100" value="50">
</div>

<div class="control-row">
<label>Vegetation <span id="vegVal">40%</span></label>
<input id="veg" type="range" min="0" max="100" value="40">
</div>

<div class="control-row">
<label>Ground Type</label>
<select id="ground">
<option value="sand">Sand</option>
<option value="soil" selected>Soil</option>
<option value="rock">Rock</option>
</select>
</div>

<button onclick="runYear()">🌧 Run Year</button>
<button onclick="resetSim()">🔄 Reset</button>
</div>

<!-- LANDSCAPE -->
<div class="panel">
<h3>Landscape</h3>
<canvas id="canvas" width="500" height="250"></canvas>
</div>

<!-- GRAPH -->
<div class="panel">
<h3>Graph</h3>
<canvas id="chart"></canvas>
</div>

<!-- TABLE -->
<div class="panel">
<h3>Data Table</h3>
<table>
<thead>
<tr>
<th>Year</th>
<th>Erosion</th>
<th>Deposition</th>
<th>Avg Height</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

</div>

<script>

// ---------------- STATE ----------------
const W = 60;

let land = [];
let year = 0;

let labels = [];
let erosionData = [];
let depositionData = [];
let heightData = [];

let chart = null;

// ---------------- INIT ----------------
function init() {

    land = [];

    let slope = getSlope();

    let base = 180;

    for (let i = 0; i < W; i++) {
        land[i] = base - i * slope * 80;
    }
}

// ---------------- INPUTS ----------------
function getSlope() { return Number(slider("slope")) / 100; }
function getWater() { return Number(slider("water")) / 100; }
function getVeg() { return Number(slider("veg")) / 100; }

function slider(id) {
    return document.getElementById(id).value;
}

// ---------------- UPDATE UI ----------------
function updateLabels() {
    slopeVal.innerText = slider("slope") + "%";
    waterVal.innerText = slider("water") + "%";
    vegVal.innerText = slider("veg") + "%";
}

// ---------------- TERRAIN GRAVITY ----------------
function gravityRelax() {

    let next = [...land];

    for (let i = 1; i < W - 1; i++) {

        let avg = (land[i-1] + land[i] + land[i+1]) / 3;

        // smooth gravity + stability
        next[i] = land[i] * 0.85 + avg * 0.15;
    }

    land = next;
}

// ---------------- SLOPE ----------------
function slopeAt(i) {
    if (i <= 0 || i >= W-1) return 0;
    return land[i-1] - land[i+1];
}

// ---------------- EROSION MODEL ----------------
function erode() {

    let water = getWater();
    let veg = getVeg();

    let groundFactor =
        slider("ground") === "sand" ? 1.6 :
        slider("ground") === "rock" ? 0.3 : 1;

    let erosion = 0;
    let deposition = 0;

    let next = [...land];

    for (let i = 1; i < W; i++) {

        let s = Math.max(0, slopeAt(i));

        // gravity-driven flow + water energy
        let force =
            (s * water * 0.02) +
            (water * 0.01);

        force *= groundFactor;
        force *= (1 - veg);

        // capped erosion (prevents runaway)
        let move = Math.min(force, 0.4);

        next[i-1] -= move;
        next[i] += move * 0.8;

        erosion += move;
        deposition += move * 0.6;
    }

    land = next;
}

// ---------------- DRAW ----------------
function draw() {

    let c = document.getElementById("canvas");
    let ctx = c.getContext("2d");

    ctx.clearRect(0,0,c.width,c.height);

    ctx.beginPath();
    ctx.moveTo(0,c.height);

    for (let i = 0; i < W; i++) {
        ctx.lineTo(i*(c.width/W), c.height - land[i]);
    }

    ctx.lineTo(c.width, c.height);
    ctx.fillStyle = "#8B5A2B";
    ctx.fill();

    // vegetation
    let veg = getVeg();

    for (let i = 0; i < W; i++) {
        let count = veg * 5;
        for (let j = 0; j < count; j++) {
            ctx.fillStyle = "green";
            ctx.fillRect(i*(c.width/W), c.height-land[i]-j*2, 2, 2);
        }
    }
}

// ---------------- RUN YEAR ----------------
function runYear() {

    updateLabels();

    erode();
    gravityRelax();

    let avg = land.reduce((a,b)=>a+b,0)/W;

    year++;

    labels.push("Y"+year);
    erosionData.push(0.2); // stable proxy
    depositionData.push(0.15);
    heightData.push(avg);

    updateChart();
    updateTable();
    draw();
}

// ---------------- CHART ----------------
function updateChart() {

    if (!chart) {
        chart = new Chart(document.getElementById("chart"), {
            type: "line",
            data: {
                labels,
                datasets: [
                    {label:"Erosion", data: erosionData},
                    {label:"Deposition", data: depositionData},
                    {label:"Avg Height", data: heightData}
                ]
            }
        });
    } else chart.update();
}

// ---------------- TABLE ----------------
function updateTable() {

    let t = document.getElementById("table");
    t.innerHTML = "";

    for (let i = 0; i < labels.length; i++) {
        t.innerHTML += `
        <tr>
        <td>${labels[i]}</td>
        <td>${erosionData[i]}</td>
        <td>${depositionData[i]}</td>
        <td>${heightData[i].toFixed(2)}</td>
        </tr>`;
    }
}

// ---------------- RESET ----------------
function resetSim() {

    year = 0;
    labels = [];
    erosionData = [];
    depositionData = [];
    heightData = [];

    if (chart) {
        chart.destroy();
        chart = null;
    }

    init();
    draw();
    updateTable();
}

// ---------------- LOOP INIT ----------------
init();
draw();
updateLabels();

</script>

</body>
</html>
